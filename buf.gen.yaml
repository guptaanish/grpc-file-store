version: v2
plugins:
  - local: frontend/node_modules/.bin/protoc-gen-es
    out: frontend/src/generated
    opt:
      - target=ts
  # Generates a single-file HTML API reference from the proto (Swagger-like docs).
  # Output lands in the frontend public/ dir so Vite bundles it into dist/, which
  # is served by Spring Boot at /grpc-docs.html.
  - remote: buf.build/community/pseudomuto-doc:v1.5.1
    out: frontend/public
    opt:
      - html,grpc-docs.html
