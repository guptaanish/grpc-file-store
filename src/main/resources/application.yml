filestore:
  chunk-size-bytes: 65536
  max-file-size-bytes: 104857600
  storage:
    type: LOCAL
    local:
      directory: ./file-store-data
  quota:
    enabled: false
    max-total-bytes: 1073741824
  ttl:
    enabled: false
    retention-days: 30

grpc:
  server:
    port: 9090
    reflection-service-enabled: true
    health-service-enabled: false

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:filestore
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.filestore: DEBUG
    net.devh.boot.grpc: INFO
    org.hibernate.SQL: WARN
